<ion-input type="email" placeholder="{{ 'AUTH.EMAIL' | transloco }}" [(ngModel)]="email"></ion-input>

<ion-input type="password" placeholder="{{ 'AUTH.PASSWORD' | transloco }}" [(ngModel)]="password"></ion-input>

<ion-button expand="block" (click)="login()" [disabled]="loading">
  {{ 'AUTH.LOGIN_BUTTON' | transloco }}
</ion-button>
