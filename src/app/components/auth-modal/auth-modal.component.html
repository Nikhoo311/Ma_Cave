<ion-header>
  <ion-toolbar>
    <ion-title>
      {{ ('AUTH.' + mode.toUpperCase()) | transloco }}
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ng-container [ngSwitch]="mode">
    <app-login-form *ngSwitchCase="AuthTypeEnum.LOGIN"></app-login-form>
    <app-register-form *ngSwitchCase="AuthTypeEnum.REGISTER"></app-register-form>
  </ng-container>

  <div class="ion-text-center ion-margin-top">
    <ion-button fill="clear" (click)="switchMode()">
      {{ ('AUTH.' + (mode === AuthTypeEnum.LOGIN ? 'NO_ACCOUNT' : 'ALREADY_ACCOUNT')) | transloco }}
    </ion-button>
  </div>
</ion-content>
