<form [formGroup]="registerForm" (ngSubmit)="register()">
  <ion-item>
    <ion-label position="floating">{{ 'AUTH.EMAIL' | transloco }}</ion-label>
    <ion-input type="email" formControlName="email"></ion-input>
  </ion-item>
  <div *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched" class="ion-padding-start ion-text-danger">
    {{ 'AUTH.RULES.EMAIL' | transloco }}
  </div>

  <ion-item>
    <ion-label position="floating">{{ 'AUTH.PASSWORD' | transloco }}</ion-label>
    <ion-input type="password" formControlName="password"></ion-input>
  </ion-item>
  <div *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched" class="ion-padding-start ion-text-danger">
    {{ 'AUTH.RULES.PASSWORD' | transloco }}
  </div>

  <ion-button expand="block" type="submit" [disabled]="loading">
    {{ 'AUTH.REGISTER_BUTTON' | transloco }}
  </ion-button>
</form>
