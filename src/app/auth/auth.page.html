<ion-content class="auth-page">
  <div class="app-header">
    <div class="app-header__content">
      <img class="app-header__logo" src="../../assets/bottle_dark_red.svg" alt="Bottle" />
      <p id="app-header__title">{{ 'APP_TITLE' | transloco }}</p>
      <p id="app-header__slogan">{{ 'APP_SLOGAN' | transloco }}</p>
    </div>
  </div>

  <ion-card class="auth-card">
    <ion-card-header>
      <ion-segment
        class="auth-segment"
        [value]="mode"
        (ionChange)="onModeChange($event)"
        mode="ios">

        <ion-segment-button [value]="AuthTypeEnum.LOGIN">
          <ion-label>{{ 'AUTH.LOGIN' | transloco }}</ion-label>
        </ion-segment-button>

        <ion-segment-button [value]="AuthTypeEnum.REGISTER">
          <ion-label>{{ 'AUTH.REGISTER' | transloco }}</ion-label>
        </ion-segment-button>

      </ion-segment>
    </ion-card-header>

    <ion-card-content>
      <ng-container [ngSwitch]="mode">
        <app-utils [mode]="mode"></app-utils>
      </ng-container>

      <div class="divider">
        <div class="divider-line"></div>
        <span>{{ 'AUTH.OR_CONNEXION_WITH' | transloco }}</span>
        <div class="divider-line"></div>
      </div>

      <ion-button
        expand="block"
        fill="outline"
        class="google-btn"
        (click)="loginWithGoogle()">
        <svg slot="start" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="20px" height="20px">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
          <path fill="none" d="M0 0h48v48H0z"/>
        </svg>
        {{ mode === AuthTypeEnum.LOGIN ? ('AUTH.GOOGLE_LOGIN' | transloco) : ('AUTH.GOOGLE_REGISTER' | transloco) }}
      </ion-button>

    </ion-card-content>
  </ion-card>
</ion-content>
